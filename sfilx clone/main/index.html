<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <!-- header section -->
    <div class="header">
        <img src="assets/logo.png" alt="logo" width="60" height="40">
        <button><i class="fa-solid fa-bars"></i> Browse</button>
        <div class="search">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="search" name="search" id="search" placeholder="enter keywords">
        </div>

    </div>

    <!-- featured section -->
    <div class="featured">
        <div class="slider-container"></div>
        <div class="featured-container"></div>
        
    </div>

    <!-- trending movies -->
    <div class="trending-container"></div>

    <!-- latest movies -->
     <div class="latest-movies-container"></div>

     <!-- latest TV Shows -->
      <div class="latest-tv-shows"></div>

      <!-- coming soon -->
       <div class="coming-soon"></div>
</body>
</html>
